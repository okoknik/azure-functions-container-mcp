# Trivy secret scanner configuration for Terraform repositories.
#
# This configuration:
# - Keeps all built-in secret detectors enabled.
# - Ignores generated Terraform artifacts that commonly contain
#   credentials or provider metadata.
# - Continues scanning all Terraform source (*.tf, *.tfvars, etc.).

allow-rules:
  # Downloaded providers and modules
  - id: terraform-cache
    description: Ignore Terraform working directory
    path: (^|.*/)\.terraform(/.*)?$

  # Terraform state
  - id: terraform-state
    description: Ignore Terraform state files
    path: (^|.*/).*\.tfstate(\.backup)?$
